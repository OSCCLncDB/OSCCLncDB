<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSCCLncDB - Oral Cancer lncRNA Database</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" />
  <style>
    body {
      font-family: 'Open Sans', sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }
    header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    main {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 20px;
    }
    .lncrna-card {
      background-color: #fff;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    .lncrna-card h2 {
      color: #2980b9;
      margin-bottom: 10px;
    }
    .lncrna-card p {
      margin: 4px 0;
    }
    footer {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      width: 100%;
      bottom: 0;
    }
    .pagination {
      text-align: center;
      margin: 20px;
    }
    .pagination button {
      margin: 0 5px;
      padding: 5px 10px;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>OSCCLncDB</h1>
    <p>A curated database of lncRNAs associated with Oral Squamous Cell Carcinoma</p>
  </header>

  <main id="data-container"></main>

  <div class="pagination">
    <button onclick="prevPage()">Previous</button>
    <span id="page-num">Page 1</span>
    <button onclick="nextPage()">Next</button>
  </div>

  <footer>
    &copy; 2025 OSCCLncDB | All rights reserved
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    let currentPage = 1;
    const itemsPerPage = 5;
    let data = [];

    function renderPage() {
      const container = document.getElementById('data-container');
      container.innerHTML = '';

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageData = data.slice(start, end);

      pageData.forEach(item => {
        const card = document.createElement('div');
        card.className = 'lncrna-card';
        card.innerHTML = `
          <h2>${item.lncRNA}</h2>
          <p><strong>Description:</strong> ${item.Description}</p>
          <p><strong>Location:</strong> ${item.Location}</p>
          <p><strong>Ensembl ID:</strong> ${item.Ensembl_ID}</p>
          <p><strong>Gene ID:</strong> ${item["Gene ID"]}</p>
          <p><strong>Expression:</strong> ${item.Expression}</p>
          <p><strong>Associations:</strong> ${item.Associations}</p>
          <p><strong>Role:</strong> ${item.Role}</p>
          <p><strong>Target/Effect:</strong> ${item["Target/effect"]}</p>
          <p><strong>Interactor:</strong> ${item.Interactor}</p>
          <p><strong>DOI:</strong> <a href="${item.doi}" target="_blank">${item.doi}</a></p>
        `;
        container.appendChild(card);
      });

      document.getElementById('page-num').textContent = `Page ${currentPage}`;
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderPage();
      }
    }

    function nextPage() {
      if (currentPage * itemsPerPage < data.length) {
        currentPage++;
        renderPage();
      }
    }

    Papa.parse('lncRNA_data.csv', {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        data = results.data;
        renderPage();
      }
    });
  </script>
</body>
</html>
