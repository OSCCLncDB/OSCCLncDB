<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OSCCLncDB - lncRNA Database</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7fa; margin: 0; padding: 20px; }
    header { background: #1a237e; color: white; padding: 20px; text-align: center; }
    h1 { margin: 0; font-size: 2rem; }
    nav { margin-top: 10px; }
    nav a { margin: 0 10px; color: #fff; text-decoration: none; font-weight: bold; }
    .container { max-width: 1200px; margin: auto; padding: 20px; }
    .card { background: #fff; border-left: 5px solid #3f51b5; padding: 15px; margin: 15px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .card h3 { margin: 0 0 10px; color: #1a237e; }
    .card p { margin: 4px 0; font-size: 0.95rem; }
    .search-box { margin: 20px 0; text-align: center; }
    .search-box input { width: 50%; padding: 10px; font-size: 1rem; }
    a { color: #1565c0; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>OSCCLncDB</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#browse">Browse</a>
    </nav>
  </header>

  <div class="container">
    <section id="home">
      <h2>Welcome to OSCCLncDB</h2>
      <p>This database curates lncRNAs associated with Oral Squamous Cell Carcinoma (OSCC). Each entry contains genomic details, expression profiles, targets, and literature references.</p>
    </section>

    <section id="browse">
      <h2>Browse lncRNAs</h2>
      <div class="search-box">
        <input type="text" id="search" placeholder="Search lncRNA by name..." onkeyup="filterCards()" />
      </div>
      <div id="lncRNA-cards"></div>
    </section>
  </div>

  <script>
    async function loadData() {
      const response = await fetch('lncRNA_data_with_description.csv');
      const data = await response.text();
      const lines = data.trim().split('\n');
      const headers = lines[0].split(',');
      const container = document.getElementById('lncRNA-cards');

      for (let i = 1; i < lines.length; i++) {
        const row = lines[i].split(',');

        if (row.length < 14) continue;

        const [
          name, sequence, length, doi, description,
          role, target, interactor, gene_id, ensembl_id,
          expression, associations, location, gene_ID
        ] = row;

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3>${name}</h3>
          <p><strong>Length:</strong> ${length}</p>
          <p><strong>Description:</strong> ${description}</p>
          <p><strong>Gene ID:</strong> ${gene_id}</p>
          <p><strong>Ensembl ID:</strong> ${ensembl_id}</p>
          <p><strong>Gene Identifier:</strong> ${gene_ID}</p>
          <p><strong>Location:</strong> ${location}</p>
          <p><strong>Expression:</strong> ${expression}</p>
          <p><strong>Role:</strong> ${role}</p>
          <p><strong>Target:</strong> ${target}</p>
          <p><strong>Interactor:</strong> ${interactor}</p>
          <p><strong>Associations:</strong> ${associations}</p>
          <p><strong>Sequence:</strong> ${sequence.slice(0, 100)}... <em>(truncated)</em></p>
          <p><strong>DOI:</strong> <a href="${doi}" target="_blank">${doi}</a></p>
        `;
        container.appendChild(card);
      }
    }

    function filterCards() {
      const input = document.getElementById('search').value.toLowerCase();
      const cards = document.getElementsByClassName('card');
      Array.from(cards).forEach(card => {
        const title = card.getElementsByTagName('h3')[0].textContent.toLowerCase();
        card.style.display = title.includes(input) ? 'block' : 'none';
      });
    }

    loadData();
  </script>
</body>
</html>
