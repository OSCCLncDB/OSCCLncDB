<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OSCC LncRNA Database</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background-color: #f9f9f9; }
    .card { background: white; padding: 1.5rem; margin-bottom: 1rem; border-radius: 10px; box-shadow: 0 0 10px #ccc; }
    .card h2 { margin: 0 0 0.5rem; color: #333; }
    .card p { margin: 0.3rem 0; line-height: 1.4; }
    .pagination { margin-top: 1rem; text-align: center; }
    .pagination button { margin: 0 5px; padding: 0.5rem 1rem; font-size: 1rem; }
  </style>
</head>
<body>

  <h1>OSCC LncRNA Database</h1>
  <div id="container"></div>
  <div class="pagination">
    <button onclick="prevPage()">Previous</button>
    <span id="pageNum">Page 1</span>
    <button onclick="nextPage()">Next</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    let data = [];
    let currentPage = 1;
    const itemsPerPage = 5;

    function renderPage() {
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageData = data.slice(start, end);

      const container = document.getElementById("container");
      container.innerHTML = "";

      pageData.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h2>${item.lncRNA}</h2>
          <p><strong>Description:</strong> ${item.Description}</p>
          <p><strong>Location:</strong> ${item.Location}</p>
          <p><strong>Ensembl ID:</strong> ${item.Ensembl_ID}</p>
          <p><strong>Expression:</strong> ${item.Expression}</p>
          <p><strong>Associations:</strong> ${item.Associations}</p>
          <p><strong>Role:</strong> ${item["Role"]}</p>
          <p><strong>Target/Effect:</strong> ${item["Target/effect"]}</p>
          <p><strong>Interactor:</strong> ${item["Interactor"]}</p>
          <p><strong>Gene ID:</strong> ${item["Gene ID"]}</p>
          <p><a href="${item.doi}" target="_blank">DOI Link</a></p>
        `;
        container.appendChild(card);
      });

      document.getElementById("pageNum").textContent = `Page ${currentPage}`;
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderPage();
      }
    }

    function nextPage() {
      if (currentPage * itemsPerPage < data.length) {
        currentPage++;
        renderPage();
      }
    }

    // Load CSV using PapaParse
    Papa.parse("lncRNA_data.csv", {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        data = results.data;
        renderPage();
      }
    });
  </script>
</body>
</html>
